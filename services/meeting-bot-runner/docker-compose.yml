version: '3.8'

services:
  runner:
    build: .
    ports:
      - "3001:3001"
    environment:
      - UPLOAD_MEETING_URL=http://host.docker.internal:3000/upload-meeting      
      # Choose one of:
      - RECORDINGS_DIR=/tmp/recordings
      - BOT_INTERNAL_SECRET=${BOT_INTERNAL_SECRET}
      - SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN}
    volumes:
      - ./.auth:/app/.auth
      - ./recordings:/tmp/recordings
    shm_size: 2g # Important for Chrome/Playwright
    privileged: true
    restart: unless-stopped
